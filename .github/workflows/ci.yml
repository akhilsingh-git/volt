name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python syntax check
        run: python -m py_compile api/main.py transcoder/transcoder.py reco/app.py reco/recommender.py
      - name: JS syntax check
        run: node --check web/webrtc.js

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images (smoke test)
        run: docker compose build
