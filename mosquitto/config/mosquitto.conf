# Volt chat realtime transport (local).
# Browsers connect anonymously over WebSocket but are READ-ONLY (see acl):
# they can only subscribe to volt/chat/#. Chat sends go through the Volt API,
# which authenticates to the broker as user `api` and publishes server-side
# with a JWT-verified username.

persistence false
allow_anonymous true
password_file /run/mosquitto/passwd
acl_file /mosquitto/config/acl

# Native MQTT (Volt API publisher)
listener 1883
protocol mqtt

# MQTT over WebSocket (for the browser, proxied via nginx /mqtt)
listener 9001
protocol websockets
