worker_processes auto;
events { worker_connections 1024; }

# ─────────────────────────────────────────────────────────────
#  Volt front door — serves the web app and reverse-proxies:
#    /hls  → mediamtx Low-Latency HLS    (streaming engine)
#    /api  → Volt API (auth, channels, chat)
#    /reco → recommender service
#    /mqtt → mosquitto (chat, MQTT-over-WebSocket)
#  RTMP ingest + packaging now lives in mediamtx (LL-HLS capable),
#  so there is no rtmp{} block here anymore.
# ─────────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    server_tokens off;

    upstream mqtt_ws { server mqtt:9001; }
    upstream mediamtx_hls { server mediamtx:8888; }

    server {
        listen 80;
        server_name localhost;

        # ── Watch app ──
        location / {
            root /www/static;
            index index.html;
            add_header Cache-Control no-cache;
        }

        # ── Low-Latency HLS (proxied to mediamtx) ──
        # LL-HLS uses blocking playlist reloads (?_HLS_msn=&_HLS_part=) and
        # streamed parts, so buffering must be OFF and HTTP/1.1 kept alive.
        location /hls/ {
            proxy_pass http://mediamtx_hls/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 30s;
            # Identify as a trusted CDN/proxy so mediamtx skips its browser
            # cookieCheck redirect (matches hlsCDNSecret in mediamtx.yml).
            proxy_set_header Authorization "Bearer volt-cdn-secret";
            # Safety net: if a redirect ever fires, keep it under /hls.
            proxy_redirect ~^/(.*)$ /hls/$1;
            add_header Cache-Control no-cache;
        }

        # ── ABR (adaptive) standard HLS — static files from the transcoder ──
        location /abr/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /data;          # /abr/<user>/master.m3u8 → /data/abr/<user>/master.m3u8
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # ── Volt API (auth, channels, chat, presence) ──
        location /api/ {
            proxy_pass http://api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── recommender (clip reco) — same-origin proxy, no CORS ──
        location /reco/ {
            proxy_pass http://reco:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── Volt chat realtime over MQTT-WebSocket ──
        location /mqtt {
            proxy_pass http://mqtt_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
