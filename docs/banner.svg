<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a16"/>
      <stop offset="1" stop-color="#05060d"/>
    </linearGradient>
    <linearGradient id="volt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#7bd8ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="rg" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#9b5cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#9b5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#rg)"/>

  <!-- grid -->
  <g stroke="#23305a" stroke-opacity="0.35" stroke-width="1">
    <path d="M0 60H1280M0 120H1280M0 180H1280M0 240H1280M0 300H1280"/>
    <path d="M80 0V320M200 0V320M320 0V320M440 0V320M560 0V320M680 0V320M800 0V320M920 0V320M1040 0V320M1160 0V320"/>
  </g>
  <!-- scanlines -->
  <g fill="#00e5ff" fill-opacity="0.04">
    <rect width="1280" height="1" y="40"/><rect width="1280" height="1" y="80"/><rect width="1280" height="1" y="160"/><rect width="1280" height="1" y="200"/><rect width="1280" height="1" y="280"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00e5ff" stroke-width="3" fill="none" stroke-opacity="0.8">
    <path d="M24 24H72M24 24V72"/>
    <path d="M1256 24H1208M1256 24V72"/>
    <path d="M24 296H72M24 296V248"/>
    <path d="M1256 296H1208M1256 296V248"/>
  </g>

  <!-- wordmark -->
  <text x="90" y="178" font-size="120" font-weight="900" letter-spacing="14" fill="url(#volt)" filter="url(#glow)">VOLT</text>
  <!-- lightning bolt -->
  <path d="M612 70 L566 178 L598 178 L572 250 L648 150 L612 150 Z" fill="#ff2e88" filter="url(#glow)"/>

  <!-- LIVE pill -->
  <g transform="translate(92,210)">
    <rect width="86" height="30" rx="4" fill="#000" stroke="#ff2b3d" stroke-opacity="0.7"/>
    <circle cx="20" cy="15" r="6" fill="#ff2b3d"/>
    <text x="36" y="21" font-size="15" font-weight="700" letter-spacing="2" fill="#ffffff">LIVE</text>
  </g>

  <!-- tagline -->
  <text x="192" y="231" font-size="20" font-weight="700" letter-spacing="3" fill="#c8ff00" font-family="'Courier New',monospace">LOCAL · TWITCH-STYLE LIVE STREAMING</text>
  <text x="92" y="288" font-size="15" font-weight="500" letter-spacing="1.5" fill="#7486b3" font-family="'Courier New',monospace">RTMP / WebRTC ingest · Low-Latency HLS + ABR · sub-second WebRTC · JWT auth · live chat</text>
</svg>
